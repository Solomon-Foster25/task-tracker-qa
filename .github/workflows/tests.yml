name: tests

on: [push, pull_request]      

jobs:
  test:
    runs-on: ubuntu-latest      

    services:                 
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: Admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: taskdb_test
        ports:
          - 5432:5432
        options: >-       
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: psql "host=localhost port=5432 dbname=taskdb_test user=Admin password=password123" -f schema.sql
      - run: pytest -v